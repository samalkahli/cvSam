<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - سيرة سام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="topbar">
        <div class="tb-logo">SAM.AK <span>Admin</span></div>
        <div class="tb-actions">
            <span class="save-status" id="save-status">جاهز للحفظ</span>
            <button class="tb-btn tb-preview" onclick="window.open('index.html','_blank')">👁 معاينة</button>
            <button class="tb-btn tb-save" id="btn-save">💾 حفظ التغييرات</button>
        </div>
    </div>
    <div id="workspace">
        <main id="main">
            <div class="card">
                <div class="card-title">تعديل النبذة والهوية (عربي)</div>
                <div class="f-grid">
                    <div class="f-group"><label class="f-label">الاسم الأول</label><input class="f-input" id="ar-name1"></div>
                    <div class="f-group"><label class="f-label">الاسم الأخير (الذهبي)</label><input class="f-input" id="ar-name2"></div>
                    <div class="f-group"><label class="f-label">المسمى (البادج)</label><input class="f-input" id="ar-badge"></div>
                    <div class="f-group"><label class="f-label">الوصف تحت الاسم</label><textarea class="f-textarea" id="ar-desc"></textarea></div>
                    <div class="f-group"><label class="f-label">فقرة عني الأولى</label><textarea class="f-textarea" id="ar-aboutP1"></textarea></div>
                    <div class="f-group"><label class="f-label">فقرة عني الثانية (الشخصية والهوايات)</label><textarea class="f-textarea" id="ar-aboutP2"></textarea></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">تعديل الألوان</div>
                <div class="f-grid">
                    <div class="f-group"><label class="f-label">لون الخلفية الداكن</label><input type="color" id="color-bg"></div>
                    <div class="f-group"><label class="f-label">اللون الذهبي (للنصوص واللمسات)</label><input type="color" id="color-gold"></div>
                </div>
            </div>
            <p style="color: #888; font-size: 0.8rem; margin-top: 1rem;">*ملاحظة: يمكنك توسيع الحقول لإضافة المهارات والخبرات الإنجليزية بتعديل ملف admin.js بنفس النسق.</p>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
